<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Advanced Traffic Matrix [Encrypted]</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=JetBrains+Mono:wght@300&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg-main: #050505;
            --neon-green: #00ff88;
            --neon-pink: #ff0088;
            --terminal-gray: #1a1a1a;
            --text-glow: 0 0 10px rgba(0, 255, 136, 0.6);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; cursor: none; }

        body {
            background: var(--bg-main);
            color: #fff;
            font-family: 'JetBrains Mono', monospace;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        #matrix-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at center, transparent 0%, rgba(0,0,0,0.8) 100%);
            pointer-events: none;
            z-index: 999;
        }

        .header-bar {
            background: var(--terminal-gray);
            border-bottom: 1px solid var(--neon-green);
            padding: 10px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 0 15px rgba(0, 255, 136, 0.2);
        }

        .status-container { display: flex; gap: 15px; font-size: 12px; }
        .status-node { color: var(--neon-green); text-transform: uppercase; letter-spacing: 1px; }
        .status-node span { animation: blink 1s infinite; }
        
        @keyframes blink { 50% { opacity: 0; } }

        .viewport-wrapper {
            flex: 1;
            position: relative;
            background: #fff;
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
            transition: filter 0.5s ease;
        }

        .stealth-overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none;
        }

        .virtual-cursor {
            position: absolute;
            width: 12px; height: 12px;
            background: var(--neon-pink);
            border-radius: 50%;
            box-shadow: 0 0 15px var(--neon-pink);
            transform: translate(-50%, -50%);
            z-index: 1000;
            transition: all 0.15s cubic-bezier(0.19, 1, 0.22, 1);
        }

        .activity-feed {
            position: absolute;
            bottom: 20px;
            left: 20px;
            width: 280px;
            background: rgba(0, 0, 0, 0.85);
            border-left: 3px solid var(--neon-green);
            padding: 10px;
            font-size: 10px;
            color: var(--neon-green);
            pointer-events: none;
        }

        .control-deck {
            background: var(--terminal-gray);
            padding: 15px;
            display: flex;
            justify-content: center;
            gap: 20px;
            border-top: 1px solid var(--neon-green);
        }

        .hex-btn {
            background: transparent;
            border: 1px solid var(--neon-green);
            color: var(--neon-green);
            padding: 8px 20px;
            font-family: 'Orbitron', sans-serif;
            font-size: 11px;
            transition: 0.3s;
        }

        .hex-btn:hover {
            background: var(--neon-green);
            color: #000;
            box-shadow: 0 0 20px var(--neon-green);
        }

        .counter-display {
            position: absolute;
            top: 10px; right: 20px;
            font-size: 24px;
            color: var(--neon-pink);
            text-shadow: 0 0 10px var(--neon-pink);
        }
    </style>
</head>
<body>
    <div id="matrix-overlay"></div>
    
    <div class="header-bar">
        <div class="status-container">
            <div class="status-node"><i class="fas fa-network-wired"></i> BYPASS_STATUS: <span>ACTIVE</span></div>
            <div class="status-node"><i class="fas fa-fingerprint"></i> MASK: HIDDEN</div>
        </div>
        <div style="font-family: 'Orbitron'; color: var(--neon-green);">TRAFFIC_GEN_v4.2</div>
    </div>

    <div class="viewport-wrapper">
        <iframe id="main-frame" src="about:blank"></iframe>
        <div class="stealth-overlay">
            <div class="virtual-cursor" id="v-cursor"></div>
            <div class="activity-feed" id="log-display"></div>
            <div class="counter-display" id="count">000000</div>
        </div>
    </div>

    <div class="control-deck">
        <button class="hex-btn" onclick="cycleEngine()">FORCE CYCLE</button>
        <button class="hex-btn" id="toggle-sim" onclick="toggleEngine()">STOP_ENGINE</button>
        <button class="hex-btn" onclick="window.location.reload()">RE-INITIALIZE</button>
    </div>

    <script>
        const ENDPOINTS = [
            'https://www.revenuecpmgate.com/wssnwv2pmz?key=959022a0974bc8ddd427a1ec9c2049b1',
            'https://www.revenuecpmgate.com/n3a4mbwqv?key=4b23dfc27f908fb5aa3fb1c61634d099'
        ];

        let state = {
            count: 0,
            active: true,
            currentIdx: 0,
            log: []
        };

        const log = (msg) => {
            state.log.unshift(`[${new Date().toLocaleTimeString()}] ${msg}`);
            if (state.log.length > 8) state.log.pop();
            document.getElementById('log-display').innerHTML = state.log.join('<br>');
        };

        const updateCounter = () => {
            state.count++;
            document.getElementById('count').innerText = state.count.toString().padStart(6, '0');
        };

        const simulateHuman = () => {
            if (!state.active) return;

            const cursor = document.getElementById('v-cursor');
            const x = Math.random() * window.innerWidth;
            const y = Math.random() * window.innerHeight;
            
            cursor.style.left = `${x}px`;
            cursor.style.top = `${y}px`;

            if (Math.random() > 0.7) {
                cursor.style.transform = 'translate(-50%, -50%) scale(0.8)';
                setTimeout(() => {
                    cursor.style.transform = 'translate(-50%, -50%) scale(1)';
                    log("INTERACTION: CLICK_EMULATED");
                }, 150);
            }

            setTimeout(simulateHuman, Math.random() * 2000 + 500);
        };

        const cycleEngine = () => {
            const frame = document.getElementById('main-frame');
            state.currentIdx = (state.currentIdx + 1) % ENDPOINTS.length;
            
            frame.style.filter = 'blur(10px)';
            setTimeout(() => {
                frame.src = ENDPOINTS[state.currentIdx];
                frame.style.filter = 'blur(0px)';
                updateCounter();
                log(`ROTATION: TARGET_SET_${state.currentIdx}`);
            }, 300);
        };

        const toggleEngine = () => {
            state.active = !state.active;
            const btn = document.getElementById('toggle-sim');
            btn.innerText = state.active ? "STOP_ENGINE" : "START_ENGINE";
            btn.style.borderColor = state.active ? "var(--neon-green)" : "var(--neon-pink)";
            if (state.active) {
                simulateHuman();
                autoCycle();
            }
        };

        const autoCycle = () => {
            if (!state.active) return;
            cycleEngine();
            const nextLoad = Math.random() * 15000 + 10000; // 10-25 seconds per rotation
            setTimeout(autoCycle, nextLoad);
        };

        // Initialization
        window.onload = () => {
            log("SYSTEM: INITIALIZING_STEALTH_PROTOCOLS");
            simulateHuman();
            autoCycle();
            
            // Auto-open hidden windows to multiply traffic pressure
            setInterval(() => {
                if(state.active && Math.random() > 0.9) {
                    const win = window.open(ENDPOINTS[Math.floor(Math.random() * 2)], '_blank', 'width=1,height=1,left=10000,top=10000');
                    setTimeout(() => win.close(), 5000);
                    log("ENGINE: MULTI_THREAD_INJECTION");
                }
            }, 30000);
        };
    </script>
</body>
</html>
